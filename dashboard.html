{% extends "base.html" %}

{% block extra_css %}
<style>
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }
    
    .dashboard-card {
        background: rgba(19, 38, 52, 0.9);
        border-radius: 25px;
        padding: 25px;
        text-align: center;
        border: 1px solid rgba(255, 152, 0, 0.3);
        transition: transform 0.3s;
    }
    
    .dashboard-card:hover {
        transform: translateY(-5px);
    }
    
    .dashboard-icon {
        font-size: 3rem;
        margin-bottom: 15px;
    }
    
    .dashboard-value {
        font-size: 2.5rem;
        font-weight: 700;
        color: #ff9800;
    }
    
    .dashboard-label {
        color: #b0c7e0;
        margin-top: 10px;
    }
    
    .quick-actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
    }
    
    .action-btn {
        background: linear-gradient(95deg, #ff9800, #f4511e);
        color: white;
        padding: 20px;
        border-radius: 25px;
        text-align: center;
        text-decoration: none;
        transition: transform 0.3s;
        display: block;
    }
    
    .action-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 20px rgba(255, 152, 0, 0.4);
    }
    
    .recent-analyses {
        background: rgba(19, 38, 52, 0.9);
        border-radius: 25px;
        padding: 25px;
        margin-top: 30px;
        border: 1px solid rgba(255, 152, 0, 0.3);
    }
    
    .analysis-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: background 0.3s;
    }
    
    .analysis-item:hover {
        background: rgba(255, 152, 0, 0.1);
    }
    
    .analysis-item:last-child {
        border-bottom: none;
    }
    
    .analysis-info {
        flex: 1;
    }
    
    .analysis-date {
        font-size: 0.85rem;
        color: #b0c7e0;
        margin-bottom: 5px;
    }
    
    .analysis-filename {
        font-size: 0.9rem;
        color: #ffcc80;
    }
    
    .analysis-stats {
        display: flex;
        gap: 20px;
        align-items: center;
    }
    
    .analysis-word-count {
        color: #b0c7e0;
        font-size: 0.9rem;
    }
    
    .analysis-score {
        background: #ff9800;
        padding: 5px 15px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 1.1rem;
    }
    
    .analysis-grade {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: bold;
    }
    
    .grade-excellent { background: #2e7d32; }
    .grade-good { background: #ff9800; }
    .grade-average { background: #ffc107; color: #333; }
    .grade-poor { background: #f44336; }
    .grade-fail { background: #b71c1c; }
    
    .loading-spinner-small {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ff9800;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    .refresh-btn {
        background: rgba(33, 150, 243, 0.2);
        border: 1px solid #2196f3;
        padding: 5px 15px;
        border-radius: 20px;
        color: white;
        cursor: pointer;
        font-size: 0.8rem;
        margin-left: 15px;
    }
    
    .refresh-btn:hover {
        background: #2196f3;
    }
    
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="stats-grid">
    <div class="dashboard-card">
        <div class="dashboard-icon">🎙️</div>
        <div class="dashboard-value" id="totalFiles">0</div>
        <div class="dashboard-label">Всего анализов</div>
    </div>
    <div class="dashboard-card">
        <div class="dashboard-icon">✅</div>
        <div class="dashboard-value" id="completedFiles">0</div>
        <div class="dashboard-label">Завершено</div>
    </div>
    <div class="dashboard-card">
        <div class="dashboard-icon">⭐</div>
        <div class="dashboard-value" id="avgScore">0</div>
        <div class="dashboard-label">Средний балл</div>
    </div>
    <div class="dashboard-card">
        <div class="dashboard-icon">⏳</div>
        <div class="dashboard-value" id="inProgress">0</div>
        <div class="dashboard-label">В процессе</div>
    </div>
</div>

<div class="quick-actions">
    <a href="/" target="_blank" class="action-btn">
        🎤 Загрузить новый звонок
    </a>
    <a href="/criteria" target="_blank" class="action-btn">
        📋 Критерии оценки
    </a>
    <a href="/database-view" target="_blank" class="action-btn">
        🗄️ База данных
    </a>
    <a href="/" class="action-btn" style="background: linear-gradient(95deg, #2e7d32, #1b5e20);">
        🏠 На главную
    </a>
</div>

<div class="recent-analyses">
    <div class="section-header">
        <h3 style="color: #ffcc80; margin: 0;">📊 Последние анализы</h3>
        <button class="refresh-btn" onclick="loadRecentAnalyses()">🔄 Обновить</button>
    </div>
    <div id="recentList">
        <div style="text-align: center; padding: 20px;">
            <div class="loading-spinner-small"></div>
            <p style="color: #b0c7e0; margin-top: 10px;">Загрузка анализов...</p>
        </div>
    </div>
</div>

<script>
    async function loadStats() {
        try {
            const response = await fetch('/stats');
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('totalFiles').textContent = data.stats.total_files;
                document.getElementById('completedFiles').textContent = data.stats.completed;
                document.getElementById('avgScore').textContent = data.stats.avg_score;
                document.getElementById('inProgress').textContent = data.stats.in_progress;
            }
        } catch (error) {
            console.error('Error loading stats:', error);
        }
    }
    
    // Загрузка последних анализов
    async function loadRecentAnalyses() {
        try {
            const response = await fetch('/api/recent-analyses');
            const data = await response.json();
            
            const container = document.getElementById('recentList');
            if (!container) return;
            
            if (data.success && data.analyses && data.analyses.length > 0) {
                container.innerHTML = data.analyses.map(analysis => {
                    // Форматирование даты
                    let dateStr = 'Дата неизвестна';
                    if (analysis.analysis_time) {
                        try {
                            const date = new Date(analysis.analysis_time);
                            dateStr = date.toLocaleString('ru-RU', {
                                day: '2-digit',
                                month: '2-digit',
                                year: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                        } catch(e) {
                            dateStr = analysis.analysis_time;
                        }
                    }
                    
                    // Определение класса оценки
                    let gradeClass = '';
                    const score = analysis.total_score || 0;
                    if (score >= 90) gradeClass = 'grade-excellent';
                    else if (score >= 80) gradeClass = 'grade-good';
                    else if (score >= 70) gradeClass = 'grade-average';
                    else if (score >= 60) gradeClass = 'grade-poor';
                    else gradeClass = 'grade-fail';
                    
                    const gradeText = analysis.grade || (score >= 90 ? 'Отлично' : score >= 80 ? 'Хорошо' : score >= 70 ? 'Средне' : score >= 60 ? 'Ниже среднего' : 'Требует обучения');
                    
                    return `
                        <div class="analysis-item" onclick="viewAnalysisDetails('${analysis.file_id}')">
                            <div class="analysis-info">
                                <div class="analysis-date">📅 ${dateStr}</div>
                                ${analysis.original_filename ? `<div class="analysis-filename">📁 ${escapeHtml(analysis.original_filename)}</div>` : ''}
                            </div>
                            <div class="analysis-stats">
                                <div class="analysis-word-count">📝 ${analysis.word_count || 0} слов</div>
                                <div class="analysis-grade ${gradeClass}">${gradeText}</div>
                                <div class="analysis-score">${score}/100</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<p style="color: #b0c7e0; text-align: center; padding: 40px;">📭 Пока нет завершенных анализов</p>';
            }
        } catch (error) {
            console.error('Error loading recent analyses:', error);
            const container = document.getElementById('recentList');
            if (container) {
                container.innerHTML = '<p style="color: #f44336; text-align: center;">❌ Ошибка загрузки анализов</p>';
            }
        }
    }
    
    // Просмотр деталей анализа
    function viewAnalysisDetails(fileId) {
        if (fileId) {
            window.open(`/analysis-result/${fileId}`, '_blank');
        }
    }
    
    // Функция для экранирования HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Вызвать функции при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        loadStats();
        loadRecentAnalyses();
    });
    
    // Обновление статистики каждые 10 секунд
    setInterval(loadStats, 10000);
    
    // Обновление списка анализов каждые 30 секунд
    setInterval(loadRecentAnalyses, 30000);
</script>
{% endblock %}
